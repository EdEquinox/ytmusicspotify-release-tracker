services:
  frontend:
    image: ghcr.io/edequinox/ytmusic-release-tracker-frontend:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      REACT_APP_URL: "${REACT_APP_URL:-http://127.0.0.1:3001}"
      REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-http://127.0.0.1:8001}"
      REACT_APP_SPOTIFY_CLIENT_ID: "${REACT_APP_SPOTIFY_CLIENT_ID:-}"
      REACT_APP_SPOTIFY_REDIRECT_URI: "${REACT_APP_SPOTIFY_REDIRECT_URI:-http://127.0.0.1:3001/artists}"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/edequinox/ytmusic-release-tracker-backend:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
    volumes:
      - /opt/ytmusic-release-tracker/data:/data
    restart: unless-stopped

  worker:
    image: ghcr.io/edequinox/ytmusic-release-tracker-worker:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      BACKEND_URL: "http://backend:8000"
      YTMUSIC_AUTH_FILE: "${YTMUSIC_AUTH_FILE:-/data/ytmusic_auth.json}"
      YTMUSIC_USER: "${YTMUSIC_USER:-}"
    volumes:
      - /opt/ytmusic-release-tracker/data:/data
    depends_on:
      - backend
    restart: unless-stopped

  worker-reverse:
    image: ${WORKER_REVERSE_IMAGE:-ghcr.io/edequinox/ytmusic-release-tracker-worker-reverse:latest}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      REVERSE_BACKEND_URL: "http://backend:8000"
      REVERSE_YTMUSIC_AUTH_FILE: "${REVERSE_YTMUSIC_AUTH_FILE:-/data/ytmusic_auth.json}"
      REVERSE_YTMUSIC_USER: "${REVERSE_YTMUSIC_USER:-}"
      REVERSE_SPOTIFY_CACHE_PATH: "${REVERSE_SPOTIFY_CACHE_PATH:-/data/spotify_oauth_cache_reverse.json}"
    volumes:
      - /opt/ytmusic-release-tracker/data:/data
    depends_on:
      - backend
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    command: --interval 300 --cleanup --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
