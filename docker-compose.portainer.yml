services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-user/ytmusic-release-tracker-frontend:latest}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      REACT_APP_URL: "${REACT_APP_URL:-http://127.0.0.1:3001}"
      REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-http://127.0.0.1:8001}"
      REACT_APP_SPOTIFY_CLIENT_ID: "${REACT_APP_SPOTIFY_CLIENT_ID:-}"
      REACT_APP_SPOTIFY_REDIRECT_URI: "${REACT_APP_SPOTIFY_REDIRECT_URI:-http://127.0.0.1:3001/artists}"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/your-user/ytmusic-release-tracker-backend:latest}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
      SPOTIFY_INCLUDE_GROUPS: "${SPOTIFY_INCLUDE_GROUPS:-album,single}"
      SPOTIFY_MARKET: "${SPOTIFY_MARKET:-PT}"
      LOCAL_FETCH_SPACING_MS: "${LOCAL_FETCH_SPACING_MS:-120}"
      RELEASE_WORKERS: "${RELEASE_WORKERS:-10}"
      YTMUSIC_PLAYLIST_ID: "${YTMUSIC_PLAYLIST_ID:-}"
      WORKER_BACKEND_RETRY_SECONDS: "${WORKER_BACKEND_RETRY_SECONDS:-15}"
      WORKER_IDLE_SECONDS: "${WORKER_IDLE_SECONDS:-20}"
      WORKER_PROCESSED_SLEEP_SECONDS: "${WORKER_PROCESSED_SLEEP_SECONDS:-10}"
      WORKER_ALBUM_AUDIO_ONLY_STRICT: "${WORKER_ALBUM_AUDIO_ONLY_STRICT:-true}"
    volumes:
      - "${DATA_DIR:-/opt/ytmusic-release-tracker/data}:/data"
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/your-user/ytmusic-release-tracker-worker:latest}
    environment:
      BACKEND_URL: "http://backend:8000"
      WORKER_BACKEND_RETRY_SECONDS: "${WORKER_BACKEND_RETRY_SECONDS:-15}"
      WORKER_IDLE_SECONDS: "${WORKER_IDLE_SECONDS:-20}"
      WORKER_PROCESSED_SLEEP_SECONDS: "${WORKER_PROCESSED_SLEEP_SECONDS:-10}"
      WORKER_ALBUM_AUDIO_ONLY_STRICT: "${WORKER_ALBUM_AUDIO_ONLY_STRICT:-true}"
      YTMUSIC_AUTH_FILE: "${YTMUSIC_AUTH_FILE:-/data/ytmusic_auth.json}"
      YTMUSIC_PLAYLIST_ID: "${YTMUSIC_PLAYLIST_ID:-}"
      YTMUSIC_USER: "${YTMUSIC_USER:-}"
    volumes:
      - "${DATA_DIR:-/opt/ytmusic-release-tracker/data}:/data"
    depends_on:
      - backend
    restart: unless-stopped
