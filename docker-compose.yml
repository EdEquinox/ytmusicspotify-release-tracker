services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ytmusic-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: "0"
      REACT_APP_URL: "${REACT_APP_URL:-http://127.0.0.1:3001}"
      REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-http://localhost:8001}"
      REACT_APP_SPOTIFY_CLIENT_ID: "${REACT_APP_SPOTIFY_CLIENT_ID:-}"
      REACT_APP_SPOTIFY_REDIRECT_URI: "${REACT_APP_SPOTIFY_REDIRECT_URI:-http://localhost:3001/artists}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytmusic-backend
    # Host:container — no PC acede-se a http://localhost:8001 (BACKEND_PORT).
    # Entre contentores o uvicorn ouve na 8000; o worker deve usar http://backend:8000.
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
    volumes:
      - ./backend:/app
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ytmusic-worker
    environment:
      BACKEND_URL: ${WORKER_BACKEND_URL:-http://backend:8000}
      YTMUSIC_AUTH_FILE: "${YTMUSIC_AUTH_FILE:-/data/ytmusic_auth.json}"
      YTMUSIC_USER: "${YTMUSIC_USER:-}"
    volumes:
      - ./worker:/app
      - ./data:/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  worker-reverse:
    build:
      context: ./worker_reverse
      dockerfile: Dockerfile
    container_name: ytmusic-worker-reverse
    environment:
      REVERSE_BACKEND_URL: ${REVERSE_WORKER_BACKEND_URL:-http://backend:8000}
      REVERSE_YTMUSIC_AUTH_FILE: "${REVERSE_YTMUSIC_AUTH_FILE:-/data/ytmusic_auth.json}"
      REVERSE_YTMUSIC_USER: "${REVERSE_YTMUSIC_USER:-}"
      # 1 = sem API Spotify nem playlist; so likes com videoId em playlist_track_links.json + SpotiFLAC (Tidal).
      REVERSE_TIDAL_ONLY: "${REVERSE_TIDAL_ONLY:-1}"
      REVERSE_SPOTIFY_CACHE_PATH: "${REVERSE_SPOTIFY_CACHE_PATH:-/data/spotify_oauth_cache_reverse.json}"
    volumes:
      - ./worker_reverse:/app
      - ./data:/data
      - ./data/downloads:/music
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
